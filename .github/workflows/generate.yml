name: Generate Questions

on:
  schedule:
    # ~9 runs/day, spaced ~2.5h apart. 9 runs x 100 calls = 900/day, under Gemini's 1,000/day cap.
    - cron: "0 9,11,14,16,19,21,0,3,6 * * *"
  workflow_dispatch: {}    # adds a manual "Run workflow" button

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate questions into Supabase
        run: node scripts/generate-questions.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
